      --networkid 7777
      --bootnodes enode://c9151cae7c889b4ef9b564f8350a85a11a39e5883662fbd54d6d8e592e65673a7b8b1bdb0e31cd501d4ded499a264fcc9aaa689f94e781bc2b5d63aa3a7f5850@172.30.0.11:30303
      --http
      --http.addr 0.0.0.0
      --http.port 8547
      --http.api eth,net,web3,personal,miner,clique,txpool,debug
      --allow-insecure-unlock
      --unlock 0x078962a2d159BCC3F982540b021BDDCD192Add7B
      --password /data/password.txt
      --mine
      --miner.etherbase 0x078962a2d159BCC3F982540b021BDDCD192Add7B
      --nat extip:172.30.0.13
      --config /data/config.toml
    networks:
      privnet:
        ipv4_address: 172.30.0.13

  # -------------------------
  # OBSERVER
  # -------------------------
  node4:
    image: ethereum/client-go:v1.13.14
    container_name: geth-node4
    volumes:
      - ./nodes/node4:/data
    command: >
      --datadir /data
      --networkid 7777
      --bootnodes enode://c9151cae7c889b4ef9b564f8350a85a11a39e5883662fbd54d6d8e592e65673a7b8b1bdb0e31cd501d4ded499a264fcc9aaa689f94e781bc2b5d63aa3a7f5850@172.30.0.11:30303
      --nat extip:172.30.0.14
      --syncmode full
      --config /data/config.toml
    networks:
      privnet:
        ipv4_address: 172.30.0.14

  # -------------------------
  # OBSERVER
  # -------------------------
  node5:
